openapi: 3.0.0
info:
  description: Gametime API
  version: "1.0.0"
  title: Gametime API
  contact:
    email: davetii@gmail.com
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'

servers:
  - url: http://localhost:8080/api
    description: Local Server

paths:
  /v1/league:
    get:
      summary: list of all teams, players in league
      description: a list of all **Actors** in the league
      tags:
        - Team
      operationId: fetchLeaguev1
      responses:
        '200':
          description: list of all teams, players in league
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /v1/team/{teamId}:
    get:
      summary: fetch Team by id
      tags:
        - Team
      operationId: fetchTeam
      parameters:
        - $ref: "#/components/parameters/teamIdPathParam"
      responses:
        '200':
          description: Found Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        '404':
          description: Not Found

  /v1/team/{teamId}/{playerId}:
    post:
      summary: Add Player to Team
      description: Add Player to Team
      operationId: addPlayerToTeam
      tags:
        - Team
      parameters:
        - $ref: "#/components/parameters/teamIdPathParam"
        - $ref: "#/components/parameters/playerIdPathParam"
      responses:
        '200':
          description: Team Updated
        '409':
          description: Player already on a team
        '404':
          description: Not Found
    delete:
      summary: Release Player from Team
      description: Remove the player from the team's roster (release to free
        agency). The player_team row is removed and a RELEASE transaction is
        appended to history; past stints stay queryable via /history.
      operationId: removePlayerFromTeam
      tags:
        - Team
      parameters:
        - $ref: "#/components/parameters/teamIdPathParam"
        - $ref: "#/components/parameters/playerIdPathParam"
      responses:
        '200':
          description: Player released
        '404':
          description: Team, player, or assignment not found

  /v1/team/{teamId}/lineup:
    put:
      summary: Set the team lineup (starting 5 + rotation order)
      description: Replace-all. The request must describe every roster player's
        lineup role and rotation order; exactly 5 entries must be STARTER.
      operationId: setLineup
      tags:
        - Team
      parameters:
        - $ref: "#/components/parameters/teamIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LineupRequest"
      responses:
        '200':
          description: Lineup updated — returns the team with its updated roster
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        '400':
          description: Invalid lineup (not exactly 5 starters, duplicate player,
            a starter with a rotation order, or a duplicate rotation order)
        '404':
          description: Team not found, or a player is not on this team

  /v1/player/:
    put:
      summary: Update Player
      description: Update player
      operationId: updatePlayer
      tags:
        - Player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Player"
      responses:
        '200':
          description: Player Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        '404':
          description: Not Found
    post:
      summary: Create Player
      description: Create
      operationId: createPlayer
      tags:
        - Player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Player"
      responses:
        '200':
          description: Player Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /v1/player/{playerId}:
    get:
      summary: fetch player by id
      tags:
        - Player
      operationId: readPlayer
      parameters:
        - $ref: "#/components/parameters/playerIdPathParam"
      responses:
        '200':
          description: Found Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        '404':
          description: Not Found

  /v1/player/{playerId}/history:
    get:
      summary: fetch a player's roster transaction history
      description: a list of the player's team assignments over time, most recent first
      tags:
        - Player
      operationId: fetchPlayerHistory
      parameters:
        - $ref: "#/components/parameters/playerIdPathParam"
      responses:
        '200':
          description: Player roster history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerTransaction"
        '404':
          description: Not Found

components:

  parameters:

    pageNumberParam:
      in: query
      description: Page number
      name: pageNumber
      schema:
        type: integer
        format: int32
        default: 1

    pageSizeParam:
      in: query
      description: Page Size
      name: pageSize
      required: false
      schema:
        type: integer
        format: int32
        default: 25

    playerIdPathParam:
      in: path
      description: Player Id
      name: playerId
      required: true
      schema:
        type: string

    teamIdPathParam:
      in: path
      description: Team ID
      name: teamId
      required: true
      schema:
        type: string



  schemas:
    Team:
      type: object
      description: A group of individuals representing a locale
      properties:
        id:
          type: string
          readOnly: true
          enum: [NY, PHI, BOS, CONN, JACK, NC, WASH, ATL, BRK, MIA, 
                 MI, CHI, TOR, VA, IND, CLEV, MIN, PIT, MIL, BUF,
                 TENN, KC, STL, HOU, SA, NOLA, DAL, DEN, OKL, AL, 
                 SD, LA, PHO, CA, POR, SF, SEA, UT, VAN, LV]
        players:
          type: array
          description: The team's roster — each player with their lineup slot
            (role + rotation order). This is the team's full state w.r.t. players.
          items:
            $ref: "#/components/schemas/RosterEntry"
        locale:
          type: string
        name:
          type: string
        coach:
          $ref: "#/components/schemas/Coach"
        gm:
          $ref: "#/components/schemas/GM"
        conference:
          type: string
          enum: [EAST, NORTH, SOUTH, WEST]

    Coach:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string

    GM:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string

    Player:
      type: object
      description: Player
      properties:
        id:
          type: string
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        firstName:
          type: string
          example: Bob
        lastName:
          type: string
          example: Johnson
        position:
          type: string
          enum: [PG, CG, SG, W, SF, F, PF, FC, C]
        status:
          type: string
          description: Player availability — intrinsic to the player, independent
            of any team. Lineup slot lives in player_team.lineupRole, not here.
          enum: [ACTIVE, INJURED, SUSPENDED]
        currentTeamId:
          type: string
          readOnly: true
          description: The team the player is currently on, or null if a free agent. Derived from the current roster assignment.
        height:
          type: string
        weight:
          type: integer
        draftSlot:
          type: string
        yearsPro:
          type: integer
        origin:
          type: string
        agility:
          type: integer
          format: int32
        charisma:
          type: integer
          format: int32
        cohesion:
          type: integer
          format: int32
        determination:
          type: integer
          format: int32
        ego:
          type: integer
          format: int32
        endurance:
          type: integer
          format: int32
        energy:
          type: integer
          format: int32
        handle:
          type: integer
          format: int32
        health:
          type: integer
          format: int32
        intelligence:
          type: integer
          format: int32
        luck:
          type: integer
          format: int32
        shotSelection:
          type: integer
          format: int32
        shotSkill:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        speed:
          type: integer
          format: int32
        strength:
          type: integer
          format: int32
        verticality:
          type: integer
          format: int32
        wingspan:
          type: integer
          format: int32
        composure:
          type: integer
          format: int32
        aggression:
          type: integer
          format: int32
        awareness:
          type: integer
          format: int32
        skills:
          $ref: "#/components/schemas/PlayerSkills"

    PlayerSkills:
      type: object
      description: Player Skill Set
      properties:
        acumen:
          type: number
        ballSecurity:
          type: number
        passing:
          type: number
        teamOffense:
          type: number
        drive:
          type: number
        freeThrows:
          type: number
        longRange:
          type: number
        perimeter:
          type: number
        post:
          type: number
        individualDefense:
          type: number
        teamDefense:
          type: number
        offenseRebound:
          type: number
        defenseRebound:
          type: number
        finishing:
          type: number
        transition:
          type: number
        rimProtection:
          type: number
        stealing:
          type: number
        shotContest:
          type: number
        foulDrawing:
          type: number
        foulProne:
          type: number
        clutch:
          type: number
        screenSetting:
          type: number
        offBallMovement:
          type: number

    PlayerTransaction:
      type: object
      description: A single roster transaction (a player joining a team)
      properties:
        playerId:
          type: string
        teamId:
          type: string
        transactionType:
          type: string
          enum: [SEED, DRAFT, TRADE, FREE_AGENCY, WAIVER, SIGN, RELEASE]
        transactionDate:
          type: string
          format: date-time

    LineupRole:
      type: string
      description: A player's slot on a specific team's roster/lineup.
      enum: [STARTER, ROTATION, BENCH, INACTIVE, MINORS]

    RosterEntry:
      type: object
      description: One player on a team's roster, with their lineup slot.
      properties:
        player:
          $ref: "#/components/schemas/Player"
        lineupRole:
          $ref: "#/components/schemas/LineupRole"
        rotationOrder:
          type: integer
          format: int32

    LineupEntry:
      type: object
      description: A requested lineup slot for one player.
      required:
        - playerId
        - lineupRole
      properties:
        playerId:
          type: string
        lineupRole:
          $ref: "#/components/schemas/LineupRole"
        rotationOrder:
          type: integer
          format: int32

    LineupRequest:
      type: object
      description: Replace-all lineup for a team. Must include every roster
        player; exactly 5 entries must be STARTER.
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LineupEntry"